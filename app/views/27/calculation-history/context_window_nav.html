
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;color:#0b0c0c;background:transparent}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.split{display:flex;min-height:560px;border:1px solid #b1b4b6;background:#fff}
.nav-pane{width:300px;min-width:300px;border-right:1px solid #b1b4b6;display:flex;flex-direction:column}
.nav-top{padding:10px 14px;background:#f3f2f1;border-bottom:1px solid #b1b4b6}
.nav-top h2{font-size:13px;font-weight:700;margin-bottom:2px}
.nav-count{font-size:11px;color:#505a5f}
.jump-row{display:flex;gap:6px;align-items:center;padding:8px 14px;border-bottom:1px solid #b1b4b6;background:#f3f2f1}
.jump-row label{font-size:11px;font-weight:700;white-space:nowrap;color:#0b0c0c}
.jump-row select{font-size:11px;padding:3px 4px;border:1px solid #0b0c0c;flex:1;background:#fff;color:#0b0c0c}
.jump-row select:focus{outline:3px solid #ffdd00;outline-offset:0}
.skip-bar{padding:6px 14px;border-bottom:1px solid #b1b4b6;background:#fff7bf;display:flex;align-items:center;justify-content:space-between;gap:8px}
.skip-bar span{font-size:11px;color:#594d00;font-weight:700}
.skip-btns{display:flex;gap:4px}
.skip-btn{font-size:11px;padding:2px 8px;border:1px solid #594d00;background:#fff7bf;color:#594d00;cursor:pointer;font-weight:700;white-space:nowrap}
.skip-btn:focus{outline:3px solid #ffdd00;outline-offset:0}
.skip-btn:disabled{opacity:0.4;cursor:default}
.calc-list{flex:1}
.above-indicator{padding:5px 14px;font-size:10px;color:#505a5f;background:#f3f2f1;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;gap:4px}
.below-indicator{padding:5px 14px;font-size:10px;color:#505a5f;background:#f3f2f1;border-top:1px solid #e8e8e8;display:flex;align-items:center;gap:4px}
.calc-row{padding:9px 14px;border-bottom:1px solid #e8e8e8;cursor:pointer;display:flex;flex-direction:column;gap:2px;background:#fff}
.calc-row:hover{background:#f0f4f9}
.calc-row.sel{background:#d2e2f1;border-left:4px solid #1d70b8;padding-left:10px}
.calc-row.sel .cr-date{color:#003078}
.calc-row:focus{outline:3px solid #ffdd00;outline-offset:-3px}
.cr-date{font-size:13px;font-weight:700;color:#1d70b8}
.cr-reason{font-size:12px;color:#0b0c0c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.cr-badge{font-size:10px;font-weight:700;color:#594d00;background:#fff7bf;padding:1px 5px;width:fit-content;margin-top:2px}
.detail-pane{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.detail-hdr{padding:14px 20px 10px;border-bottom:2px solid #0b0c0c;background:#fff}
.detail-hdr h2{font-size:15px;font-weight:700}
.detail-meta{display:flex;gap:14px;margin-top:4px;flex-wrap:wrap}
.detail-meta span{font-size:12px;color:#505a5f}
.detail-meta strong{color:#0b0c0c}
.chg-tag{font-size:11px;font-weight:700;color:#594d00;background:#fff7bf;padding:2px 6px}
.detail-body{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.sec-title{font-size:13px;font-weight:700;border-bottom:1px solid #b1b4b6;padding-bottom:5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.changed-box{background:#fff7bf;border-left:4px solid #ffbf47;padding:8px 12px;border-radius:0}
.changed-box h4{font-size:12px;font-weight:700;margin-bottom:5px}
.changed-box ul{list-style:none;display:flex;flex-direction:column;gap:3px}
.changed-box ul li{font-size:12px;display:flex;gap:6px;align-items:flex-start;color:#0b0c0c}
.changed-box ul li .ti{font-size:13px;flex-shrink:0;margin-top:1px;color:#594d00}
.dates-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #b1b4b6}
.dc{padding:9px 12px;border-bottom:1px solid #e8e8e8;border-right:1px solid #e8e8e8;min-height:52px}
.dc:nth-child(4n){border-right:none}
.dc.na-c{background:#f3f2f1}
.dc.chg-c{background:#fff7bf}
.dc-label{font-size:10px;color:#505a5f;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px}
.dc-val{font-size:12px;font-weight:700;color:#0b0c0c;font-variant-numeric:tabular-nums}
.dc-val.na{color:#b1b4b6;font-weight:400;font-size:11px}
.dc-delta{font-size:10px;font-weight:700;margin-top:2px}
.dc-delta.later{color:#d4351c}
.dc-delta.earlier{color:#00703c}
.sum-bar{display:flex;gap:8px}
.sum-stat{background:#f3f2f1;padding:7px 10px;flex:1}
.sum-stat .sl{font-size:10px;color:#505a5f;font-weight:700;text-transform:uppercase}
.sum-stat .sv{font-size:17px;font-weight:700;margin-top:1px}
.drill-link{font-size:12px;color:#1d70b8;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;display:inline-flex;align-items:center;gap:4px;margin-top:8px}
.drill-link:focus{outline:3px solid #ffdd00}
</style>

<h2 class="sr-only">Calculation history viewer with context-window navigation — the list recentres on the selected calculation, showing a fixed number of neighbours either side.</h2>

<div class="split">
  <nav class="nav-pane" aria-label="Calculation history">
    <div class="nav-top">
      <h2>Calculation history</h2>
      <div class="nav-count" id="navCount"></div>
    </div>
    <div class="jump-row">
      <label for="jumpSelect">Jump to</label>
      <select id="jumpSelect" onchange="jumpTo(parseInt(this.value))" aria-label="Jump to calculation"></select>
    </div>
    <div class="skip-bar" id="skipBar" aria-label="Skip to changed calculations">
      <span><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Skip to change</span>
      <div class="skip-btns">
        <button class="skip-btn" id="prevChange" onclick="skipChange(-1)" aria-label="Previous calculation with date changes"><i class="ti ti-arrow-left" aria-hidden="true"></i> Prev change</button>
        <button class="skip-btn" id="nextChange" onclick="skipChange(1)" aria-label="Next calculation with date changes">Next change <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>
    </div>
    <div id="calcList" role="listbox" aria-label="Calculations"></div>
  </nav>

  <div class="detail-pane" role="region" aria-live="polite" aria-label="Calculation detail">
    <div id="detailPanel"></div>
  </div>
</div>

<script>
const WINDOW = 4;

const calcs = [
  {id:0,date:'12 May 2026',reason:'New offence added',est:'HMP Brixton',src:'NOMIS',hasChange:true,changed:['New sentence: 18 months ABH (Court 2)','UAL +14 days added'],courts:2,sentences:7,adjs:2,dates:{CRD:{v:'14 Nov 2027',d:'+14d',dir:'later'},LED:{v:'14 May 2028',d:'+14d',dir:'later'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027',d:'+14d',dir:'later'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:1,date:'28 Mar 2026',reason:'Recall — licence breach',est:'HMP Brixton',src:'NOMIS',hasChange:true,changed:['CRD earlier by 14 days','HDC exclusion adjustment removed'],courts:2,sentences:6,adjs:1,dates:{CRD:{v:'31 Oct 2027',d:'-14d',dir:'earlier'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'19 Jul 2027',d:'-14d',dir:'earlier'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:2,date:'05 Jan 2026',reason:'Routine recalculation',est:'HMP Brixton',src:'NOMIS',hasChange:false,changed:[],courts:2,sentences:6,adjs:1,dates:{CRD:{v:'14 Nov 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:3,date:'19 Sep 2025',reason:'Initial calculation',est:'HMP Wandsworth',src:'Manual',hasChange:false,changed:[],courts:1,sentences:5,adjs:0,dates:{CRD:{v:'14 Nov 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:4,date:'14 Jul 2025',reason:'Sentence variation',est:'HMP Wandsworth',src:'NOMIS',hasChange:false,changed:[],courts:1,sentences:5,adjs:0,dates:{CRD:{v:'14 Nov 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:5,date:'02 Mar 2025',reason:'Admin correction',est:'HMP Wandsworth',src:'Manual',hasChange:false,changed:[],courts:1,sentences:5,adjs:0,dates:{CRD:{v:'14 Nov 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:6,date:'10 Nov 2024',reason:'UAL adjustment',est:'HMP Wandsworth',src:'NOMIS',hasChange:false,changed:[],courts:1,sentences:5,adjs:1,dates:{CRD:{v:'14 Nov 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:7,date:'22 Aug 2024',reason:'Court order update',est:'HMP Wandsworth',src:'NOMIS',hasChange:false,changed:[],courts:1,sentences:4,adjs:0,dates:{CRD:{v:'14 Nov 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:8,date:'17 May 2024',reason:'Routine recalculation',est:'HMP Wandsworth',src:'NOMIS',hasChange:true,changed:['SED added — indeterminate sentence ended','NPD removed'],courts:1,sentences:4,adjs:0,dates:{CRD:{v:'14 Nov 2027',d:'+30d',dir:'later'},LED:{v:'30 Apr 2028'},SED:{v:'14 Nov 2028',d:'new',dir:'later'},HDCED:{v:'N/A'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:9,date:'01 Feb 2024',reason:'Sentence update',est:'HMP Belmarsh',src:'NOMIS',hasChange:false,changed:[],courts:1,sentences:4,adjs:0,dates:{CRD:{v:'15 Oct 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:10,date:'09 Oct 2023',reason:'Admin correction',est:'HMP Belmarsh',src:'Manual',hasChange:false,changed:[],courts:1,sentences:4,adjs:0,dates:{CRD:{v:'15 Oct 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:11,date:'14 Jun 2023',reason:'Routine recalculation',est:'HMP Belmarsh',src:'NOMIS',hasChange:false,changed:[],courts:1,sentences:4,adjs:0,dates:{CRD:{v:'15 Oct 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'02 Aug 2027'},TUSED:{v:'N/A'},PED:{v:'01 Jan 2027'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:12,date:'03 Mar 2023',reason:'Sentence update',est:'HMP Belmarsh',src:'NOMIS',hasChange:true,changed:['CRD earlier by 30 days','New adjustment: RDR -30 days'],courts:1,sentences:3,adjs:1,dates:{CRD:{v:'15 Oct 2027',d:'-30d',dir:'earlier'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'N/A'},TUSED:{v:'N/A'},PED:{v:'N/A'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
  {id:13,date:'11 Jan 2023',reason:'Initial calculation',est:'HMP Belmarsh',src:'Manual',hasChange:false,changed:[],courts:1,sentences:3,adjs:0,dates:{CRD:{v:'14 Nov 2027'},LED:{v:'30 Apr 2028'},SED:{v:'N/A'},HDCED:{v:'N/A'},TUSED:{v:'N/A'},PED:{v:'N/A'},NPD:{v:'N/A'},ARD:{v:'14 May 2027'}}},
];

const DATE_KEYS=['CRD','LED','SED','HDCED','TUSED','PED','NPD','ARD'];
const DATE_LABELS={CRD:'Conditional release',LED:'Licence expiry',SED:'Sentence expiry',HDCED:'HDC eligibility',TUSED:'Top-up supervision',PED:'Parole eligibility',NPD:'Non-parole date',ARD:'Automatic release'};

let sel = 0;

function getWindow(idx){
  const half = Math.floor(WINDOW/2);
  let start = idx - half;
  let end = idx + half;
  if(start < 0){ end += Math.abs(start); start = 0; }
  if(end >= calcs.length){ start = Math.max(0, start-(end-calcs.length+1)); end = calcs.length-1; }
  return {start, end};
}

function render(){
  const c = calcs[sel];
  const {start, end} = getWindow(sel);
  const hiddenAbove = start;
  const hiddenBelow = calcs.length - 1 - end;
  const changesAbove = calcs.slice(0, start).filter(x=>x.hasChange).length;
  const changesBelow = calcs.slice(end+1).filter(x=>x.hasChange).length;

  document.getElementById('navCount').textContent = `${calcs.length} calculations · ${calcs.filter(x=>x.hasChange).length} with date changes`;

  const sel2 = document.getElementById('jumpSelect');
  sel2.innerHTML = calcs.map((x,i)=>`<option value="${i}"${i===sel?' selected':''}>${x.date} — ${x.reason.substring(0,28)}${x.hasChange?' ★':''}</option>`).join('');

  let listHtml = '';
  if(hiddenAbove > 0){
    listHtml += `<div class="above-indicator" aria-label="${hiddenAbove} earlier calculations not shown">
      <i class="ti ti-dots" style="font-size:12px" aria-hidden="true"></i>
      ${hiddenAbove} earlier calculation${hiddenAbove>1?'s':''} not shown${changesAbove>0?` · <strong style="color:#594d00">${changesAbove} with changes</strong>`:''}
    </div>`;
  }
  for(let i=start;i<=end;i++){
    const x=calcs[i];
    listHtml+=`<div class="calc-row${i===sel?' sel':''}" role="option" aria-selected="${i===sel}" tabindex="${i===sel?0:-1}" data-idx="${i}" onclick="pick(${i})" onkeydown="rowKey(event,${i})">
      <div class="cr-date">${x.date}</div>
      <div class="cr-reason">${x.reason}</div>
      <div style="font-size:11px;color:#505a5f">${x.est}</div>
      ${x.hasChange?`<div class="cr-badge"><i class="ti ti-alert-triangle" style="font-size:10px;vertical-align:-1px;margin-right:2px" aria-hidden="true"></i>Dates changed</div>`:''}
    </div>`;
  }
  if(hiddenBelow > 0){
    listHtml += `<div class="below-indicator" aria-label="${hiddenBelow} later calculations not shown">
      <i class="ti ti-dots" style="font-size:12px" aria-hidden="true"></i>
      ${hiddenBelow} later calculation${hiddenBelow>1?'s':''} not shown${changesBelow>0?` · <strong style="color:#594d00">${changesBelow} with changes</strong>`:''}
    </div>`;
  }
  document.getElementById('calcList').innerHTML = listHtml;

  const prevChangeIdx = calcs.slice(0,sel).map((x,i)=>({x,i})).filter(o=>o.x.hasChange).pop();
  const nextChangeIdx = calcs.slice(sel+1).findIndex(x=>x.hasChange);
  document.getElementById('prevChange').disabled = !prevChangeIdx;
  document.getElementById('nextChange').disabled = nextChangeIdx===-1;

  const datesHtml = DATE_KEYS.map(k=>{
    const d=c.dates[k]||{v:'N/A'};
    const na=d.v==='N/A',chg=d.d&&!na;
    return `<div class="dc${na?' na-c':''}${chg?' chg-c':''}" aria-label="${DATE_LABELS[k]}: ${d.v}">
      <div class="dc-label">${k}</div>
      <div class="dc-val${na?' na':''}">${d.v}</div>
      ${chg?`<div class="dc-delta ${d.dir}">${d.dir==='later'?'▲':'▼'} ${d.d}</div>`:''}
    </div>`;
  }).join('');

  const changedBox = c.hasChange&&c.changed.length?`<div class="changed-box">
    <h4><i class="ti ti-git-diff" style="font-size:12px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>What changed</h4>
    <ul>${c.changed.map(w=>`<li><i class="ti ti-point-filled" aria-hidden="true"></i><span>${w}</span></li>`).join('')}</ul>
  </div>`:'';

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-hdr">
      <h2>${c.date} — ${c.reason}</h2>
      <div class="detail-meta">
        <span><strong>Establishment:</strong> ${c.est}</span>
        <span><strong>Source:</strong> ${c.src}</span>
        <span><strong>Calculation:</strong> ${sel+1} of ${calcs.length}</span>
        ${c.hasChange?`<span class="chg-tag">Dates changed</span>`:''}
      </div>
    </div>
    <div class="detail-body">
      ${changedBox}
      <div>
        <div class="sec-title">
          <span><i class="ti ti-calendar" style="font-size:12px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>Release dates</span>
          <span style="font-size:10px;font-weight:400;color:#505a5f"><span style="display:inline-block;width:8px;height:8px;background:#fff7bf;border:1px solid #ffbf47;margin-right:3px;vertical-align:middle"></span>Changed from previous</span>
        </div>
        <div class="dates-grid" role="table" aria-label="Release dates">${datesHtml}</div>
      </div>
      <div>
        <div class="sec-title"><i class="ti ti-gavel" style="font-size:12px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>Court cases &amp; adjustments</div>
        <div class="sum-bar">
          <div class="sum-stat"><div class="sl">Court cases</div><div class="sv">${c.courts}</div></div>
          <div class="sum-stat"><div class="sl">Sentences</div><div class="sv">${c.sentences}</div></div>
          <div class="sum-stat"><div class="sl">Adjustments</div><div class="sv">${c.adjs}</div></div>
        </div>
        <button class="drill-link"><i class="ti ti-external-link" style="font-size:12px" aria-hidden="true"></i>View court cases &amp; adjustments</button>
      </div>
    </div>`;
}

function pick(idx){ sel=idx; render(); document.querySelector(`[data-idx="${idx}"]`)?.focus(); }
function jumpTo(idx){ sel=idx; render(); }
function rowKey(e,idx){
  if(e.key==='ArrowDown'){e.preventDefault();if(sel<calcs.length-1)pick(sel+1);}
  if(e.key==='ArrowUp'){e.preventDefault();if(sel>0)pick(sel-1);}
  if(e.key==='Enter'||e.key===' '){e.preventDefault();pick(idx);}
}
function skipChange(dir){
  if(dir===-1){
    const prev=calcs.slice(0,sel).map((x,i)=>({x,i})).filter(o=>o.x.hasChange).pop();
    if(prev) pick(prev.i);
  } else {
    const nextOffset=calcs.slice(sel+1).findIndex(x=>x.hasChange);
    if(nextOffset!==-1) pick(sel+1+nextOffset);
  }
}

render();
</script>
