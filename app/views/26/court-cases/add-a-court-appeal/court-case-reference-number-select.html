{% extends "../template.html" %}
{% block content %}
<div class="govuk-grid-row govuk-!-margin-top-4">
    <div class="govuk-grid-column-two-thirds">
                <form class="form" action="/{{data.prototypeVersion}}/new-court-case-appeal-ref" method="post">
            <div class="govuk-form-group"> 
                <fieldset class="govuk-fieldset">
                    <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                        <h1 class="govuk-fieldset__heading">
                            <span class="govuk-caption-l">Add hearing information</span>
                            Is the case reference {{ data.courtCases[data.courtCaseIndex].appearances.at(-1)['court-case-ref'] }}?
                        </h1>
                    </legend>
                    <div class="govuk-hint">This is the case reference used in the previous hearing.</div>
                    <div class="govuk-radios" data-module="govuk-radios">
                        <div class="govuk-radios__item">
                            <input class="govuk-radios__input" id="appeal-ref-select-1" name="appealrefselect" type="radio" value="Yes">
                            <label class="govuk-label govuk-radios__label" for="appeal-ref-select-1">
                                Yes
                            </label>
                        </div>
                        <div class="govuk-radios__item">
                            <input class="govuk-radios__input" id="appeal-ref-select-2" name="appealrefselect" type="radio" value="No">
                            <label class="govuk-label govuk-radios__label" for="appeal-ref-select-2">
                                No
                            </label>
                        </div>
                    </div>
                </fieldset>
            </div>
            <div class="govuk-button-group">
                <button type="submit" class="govuk-button" data-module="govuk-button">
                    Continue
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
